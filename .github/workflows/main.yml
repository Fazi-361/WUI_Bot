on: push

jobs:
  push_and_restart_bot_alwaysdata:
    name: Pull and restart
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            git pull
            ./.venv/bin/pip install -r requirements.txt
      - name: Restart bot using curl API request
        run: "curl -X POST --basic --user ${{ secrets.API_KEY }}: https://api.alwaysdata.com/v1/${{ vars.SERVICE }}/${{ secrets.SERVICE_ID }}/restart/"
